name: flutter_template
description: "A multi-tenant wedding app platform — one app, infinite weddings."
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1

  # Firebase — core platform
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.7

  # Networking & storage
  http: ^1.0.0
  shared_preferences: ^2.2.2

  # Device features
  local_auth: ^2.1.7
  url_launcher: ^6.3.0

  # WebView (RSVP forms)
  webview_flutter: ^4.2.2
  webview_flutter_wkwebview: ^3.0.4

  # Notifications
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
